version: '3.8'

# Enterprise RAG Platform - Reference Deployment
# This docker-compose file is a REFERENCE IMPLEMENTATION showing deployment patterns.
# For production use, adapt security, networking, and resource limits to your requirements.

services:
  # Workflow Orchestration Layer
  n8n:
    image: n8nio/n8n:latest
    container_name: rag-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-change_this_password}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${N8N_HOST:-localhost}:5678/
      - GENERIC_TIMEZONE=${TIMEZONE:-America/New_York}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - rag_network

  # AI Services Layer (FastAPI)
  # Note: This is a reference placeholder. In actual deployment, 
  # build from your FastAPI service codebase.
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: rag-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=rag_platform
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_this_password}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - ENVIRONMENT=production
    volumes:
      - ./models:/app/models  # Local model cache
    depends_on:
      - qdrant
      - postgres
    networks:
      - rag_network

  # Vector Database (Knowledge Layer)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC (optional)
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag_network

  # Metadata Storage
  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rag_platform
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_network

  # Optional: Monitoring (Prometheus + Grafana)
  # Uncomment for observability
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: rag-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus_data:/prometheus
  #   networks:
  #     - rag_network

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: rag-grafana
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #   depends_on:
  #     - prometheus
  #   networks:
  #     - rag_network

volumes:
  n8n_data:
    driver: local
  qdrant_storage:
    driver: local
  postgres_data:
    driver: local
  # prometheus_data:
  #   driver: local
  # grafana_data:
  #   driver: local

networks:
  rag_network:
    driver: bridge

# Usage:
# 1. Copy this file to your deployment environment
# 2. Create a .env file with your secrets:
#    POSTGRES_PASSWORD=your_secure_password
#    N8N_PASSWORD=your_n8n_password
#    OPENROUTER_API_KEY=your_api_key
# 3. Run: docker-compose up -d
# 4. Access:
#    - n8n: http://localhost:5678
#    - FastAPI: http://localhost:8000
#    - Qdrant dashboard: http://localhost:6333/dashboard
